# Scala Steward configuration — see https://github.com/scala-steward-org/scala-steward/blob/main/docs/repository-specific-configuration.md

pullRequests.frequency = "@weekly"

# Group interlocked dependencies into single PRs to keep CI green
# (mismatched versions across these often break compile/tests).
pullRequests.grouping = [
  {
    name = "scalatest",
    title = "Update scalatest stack",
    filter = [
      { group = "org.scalatest" },
      { group = "org.scalactic" },
      { group = "org.scalatestplus" }
    ]
  },
  {
    name = "sbt-plugins",
    title = "Update sbt plugins",
    filter = [
      { group = "ch.epfl.scala" },
      { group = "org.scalameta", artifact = "sbt-scalafmt" },
      { group = "org.scoverage" },
      { group = "com.github.sbt" },
      { group = "org.xerial.sbt" }
    ]
  }
]

updates.pin = [
  # Akka 2.7+ moved to BSL — stay on 2.6.x. Pekko migration is tracked in #60.
  { groupId = "com.typesafe.akka", version = "2.6." },

  # logback-classic 1.5.x requires JDK17; we target JDK11 (per build.sbt comment).
  { groupId = "ch.qos.logback", artifactId = "logback-classic", version = "1.4." }
]

updates.ignore = [
  # ws-client is a sibling library managed manually via publishLocal / coordinated releases.
  { groupId = "io.cequence" },

  # Scala cross-build versions (2.12.18 / 2.13.11 / 3.2.2) are explicit and bumping any
  # is a coordinated change — don't auto-bump.
  { groupId = "org.scala-lang", artifactId = "scala-library" },
  { groupId = "org.scala-lang", artifactId = "scala3-library" },
  { groupId = "org.scala-lang", artifactId = "scala-compiler" },
  { groupId = "org.scala-lang", artifactId = "scala3-compiler" }
]
