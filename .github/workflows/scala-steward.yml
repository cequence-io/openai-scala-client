name: Scala Steward

# Runs weekly to scan for outdated dependencies and open PRs against master.
# Configuration (pins, ignores, grouping) lives in `.scala-steward.conf` at the repo root.

on:
  schedule:
    - cron: '0 6 * * MON'
  workflow_dispatch:

jobs:
  scala-steward:
    runs-on: ubuntu-latest
    name: Update dependencies
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Scala Steward
        uses: scala-steward-org/scala-steward-action@v2
        with:
          # PAT (classic, with `repo` scope) — the default GITHUB_TOKEN cannot trigger
          # CI on the PRs it opens, so Scala Steward must use a separate token.
          github-token: ${{ secrets.SCALA_STEWARD_TOKEN }}
          # Explicit author identity (the PAT account has email privacy on, so Steward
          # cannot derive an author email from the GitHub API).
          author-email: scala-steward@cequence.io
          author-name: Scala Steward
