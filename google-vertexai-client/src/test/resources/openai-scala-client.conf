# Test-only subset of openai-client's openai-scala-client.conf: this module depends only on
# openai-core, so the real mapping (shipped with openai-client) is not on the test classpath.
openai-scala-client {
  reasoning-effort-thinking-budget-mapping {
    minimal {
      gemini = 256
    }
    medium {
      gemini = 4096
    }
    max {
      gemini = 32768
    }
  }
}
